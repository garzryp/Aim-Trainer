<!DOCTYPE html>
<html>
<head>
    <title>Mace Drop-Hit Trainer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; transform: translate(-50%, -50%); pointer-events: none; }
        #ui { position: fixed; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .success { color: #00ff00; }
        .fail { color: #ff4444; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <div id="status">PRESS SPACE TO DROP</div>
        Distance: <span id="dist">0</span>m<br>
        Score: <span id="score">0</span>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Environment
        scene.add(new THREE.GridHelper(100, 100, 0x222222, 0x111111));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        
        // Physics/State Variables
        let velocity = 0;
        let isFalling = false;
        let score = 0;
        const GRAVITY = 0.015;
        const REACH = 3.0; // Minecraft hit distance
        const START_HEIGHT = 8;

        camera.position.set(0, START_HEIGHT, 0);
        camera.rotation.order = 'YXZ';

        // Target (0.6 x 1.8 Hitbox)
        const target = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 1.8, 0.6),
            new THREE.MeshPhongMaterial({ color: 0xff0000, wireframe: true })
        );
        target.position.set(0, 0.9, -2); // Set 2 blocks in front
        scene.add(target);

        // Controls
        document.body.onclick = () => document.body.requestPointerLock();
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isFalling) {
                isFalling = true;
                document.getElementById('status').innerText = "FALLING - AIM & HIT!";
            }
        });

        const raycaster = new THREE.Raycaster();
        window.onclick = () => {
            if (!isFalling || document.pointerLockElement !== document.body) return;

            raycaster.setFromCamera({ x: 0, y: 0 }, camera);
            const intersects = raycaster.intersectObject(target);
            
            // Check distance to target center
            const distance = camera.position.distanceTo(target.position);
            const statusEl = document.getElementById('status');

            if (intersects.length > 0) {
                if (distance <= REACH) {
                    score++;
                    statusEl.innerText = "CRIT HIT!";
                    statusEl.className = "success";
                    resetPos();
                } else {
                    statusEl.innerText = "TOO FAR! (" + distance.toFixed(1) + "m)";
                    statusEl.className = "fail";
                }
            }
        };

        function resetPos() {
            isFalling = false;
            velocity = 0;
            camera.position.y = START_HEIGHT;
            document.getElementById('score').innerText = score;
            // Randomize target position slightly for variety
            target.position.x = (Math.random() - 0.5) * 4;
            target.position.z = -Math.random() * 2 - 1;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isFalling) {
                velocity += GRAVITY;
                camera.position.y -= velocity;

                // Ground collision
                if (camera.position.y <= 1.62) {
                    camera.position.y = 1.62;
                    if (isFalling) {
                        document.getElementById('status').innerText = "LANDED - MISSED CRIT";
                        document.getElementById('status').className = "fail";
                        setTimeout(resetPos, 1000);
                        isFalling = false;
                    }
                }
            }

            const d = camera.position.distanceTo(target.position);
            document.getElementById('dist').innerText = d.toFixed(1);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
